<ng-container *ngIf="vm$ | async as vm">
  <div class="series-container">
    <div class="series-header" *ngIf="vm.seriesInfo">
      <img
        class="series-thumb"
        [src]="vm.seriesInfo.thumbnail || fallbackThumbnail"
        [alt]="vm.seriesInfo.name + ' thumbnail'"
        loading="lazy"
        decoding="async"
        (error)="onImgError($event)"
      />
      <div class="series-meta">
        <h1 class="title">{{ vm.seriesInfo.name }}</h1>
        <p class="subtitle">{{ vm.seriesInfo.count }} episodes</p>
      </div>
    </div>

    <h2 class="episodes-title">Seasons</h2>
    <div class="seasons" *ngIf="vm.seasons.length; else empty">
      <a
        class="season"
        *ngFor="let s of vm.seasons"
        [routerLink]="['/series', vm.seriesName, 'season', s.seasonNumber]"
        [state]="vm.seriesFile ? { file: vm.seriesFile } : {}"
      >
        <img
          class="season-thumb"
          [src]="s.thumbnail || fallbackThumbnail"
          [alt]="vm.seriesName + ' Season ' + s.seasonNumber"
          loading="lazy"
          decoding="async"
          (error)="onImgError($event)"
        />
        <div class="season-meta">
          <div class="season-title">Season {{ s.seasonNumber }}</div>
          <div class="season-sub">{{ s.episodeCount }} episodes</div>
        </div>
      </a>
    </div>

    <ng-template #empty>
      <p class="hint">No episodes found.</p>
    </ng-template>
  </div>
</ng-container>
