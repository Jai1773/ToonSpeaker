<div class="search-page">
  <h1>Search</h1>

  <p class="hint" *ngIf="!query">Start typing to search series.</p>

  <p class="hint" *ngIf="query">
    Showing results for: <span class="q">{{ query }}</span>
  </p>

  <div class="results" *ngIf="sections.length || movieResults.length; else empty">
    <div class="result-section" *ngIf="movieResults.length">
      <h2>Movies</h2>
      <div class="movie-grid">
        <app-video-card
          *ngFor="let movie of movieResults"
          [video]="movie"
          (cardClick)="openMovie(movie)"
        ></app-video-card>
      </div>
    </div>

    <div class="result-section" *ngFor="let section of sections">
      <h2>{{ section.title }}</h2>
      <div class="series-grid">
        <app-series-card *ngFor="let s of section.items" [series]="s"></app-series-card>
      </div>
    </div>
  </div>

  <ng-template #empty>
    <p class="hint" *ngIf="query">No results found.</p>
  </ng-template>
</div>
