<div class="player-page">
  <ng-container *ngIf="safeUrl; else notFound">
    <div class="player-card">
      <iframe [src]="safeUrl" width="100%" height="200" frameborder="0" allowfullscreen></iframe>

      <div class="details">
        <div class="selectors" *ngIf="availableAudios.length > 1 || availableQualities.length > 1">
          <label class="selector" *ngIf="availableAudios.length > 1">
            <span class="selector-label">Audio</span>
            <select class="selector-input" [value]="selectedAudio" (change)="onAudioChange($event)">
              <option *ngFor="let a of availableAudios" [value]="a">{{ a }}</option>
            </select>
          </label>

          <label class="selector" *ngIf="availableQualities.length > 1">
            <span class="selector-label">Video Quality</span>
            <select class="selector-input" [value]="selectedQuality ?? ''" (change)="onQualityChange($event)">
              <option *ngFor="let q of availableQualities" [value]="q">{{ q }}p</option>
            </select>
          </label>
        </div>

        <h2>{{ video?.title }}</h2>
        <div class="controls">
          <button type="button" (click)="prevVideo()">Previous</button>
          <button type="button" (click)="nextVideo()">Next</button>
        </div>
      </div>
    </div>

    <h3 class="more-title">More videos</h3>
    <div class="more-videos">
      <button type="button" class="mini-card" *ngFor="let v of videos" (click)="router.navigate(['/watch', v.id])">
        <p>{{ v.title }}</p>
      </button>
    </div>
  </ng-container>
</div>

<ng-template #notFound>
  <p class="hint">Video not found.</p>
</ng-template>
